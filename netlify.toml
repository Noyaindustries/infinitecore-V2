# Variables d’environnement Netlify : voir **.env.netlify.example** (INFINITE_CORE_API_URL, PADDE_WEBHOOK_SECRET).

[build]
  command = "npm run build"
  publish = "dist"

[functions]
  node_bundler = "esbuild"
  # Les implémentations vivent à la racine (`padde-ci.ts`, `files-*.ts`) ; ce dossier
  # expose les handlers attendus par `/.netlify/functions/*`.
  directory = "netlify/functions"

[[redirects]]
  from = "/api/webhooks/padde-ci"
  to = "/.netlify/functions/padde-ci"
  status = 200

[[redirects]]
  from = "/api/files/upload"
  to = "/.netlify/functions/files-upload"
  status = 200

[[redirects]]
  from = "/api/files/download"
  to = "/.netlify/functions/files-download"
  status = 200

[[redirects]]
  from = "/api/files"
  to = "/.netlify/functions/files-delete"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
